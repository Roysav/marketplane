syntax = "proto3";

package marketplane.v1;

option go_package = "github.com/roysav/marketplane/api/gen/marketplane/v1;marketplanev1";

import "google/protobuf/struct.proto";



service LedgerService {
  rpc Append(AppendLedger) returns (AppendLedgerResponse);
  rpc List(ListLedgerRequest) returns (ListLedgerResponse);
}


message AppendLedger {
  string allocation = 1;
  string tradespace = 2;
  string amount     = 3;
  string currency   = 4;
}

message AppendLedgerResponse {}

message ListLedgerRequest {
  string tradespace = 1;
}

message ListLedgerResponse {
  repeated LedgerEntry entries = 1;
}

message LedgerEntry {
  string key       = 1;
  string amount    = 2;
  string remaining = 3;
  string currency  = 4;
}

